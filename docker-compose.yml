services:
  db:
    image: postgres:15-alpine
    container_name: db
    environment:
      POSTGRES_USER: todouser
      POSTGRES_PASSWORD: todopass
      POSTGRES_DB: tododb
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: 
      context: ./backend  
    container_name: backend
    env_file:
      - backend/.env 
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build: 
      context: ./frontend 
    container_name: frontend
    ports:
      - "8888:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata: 